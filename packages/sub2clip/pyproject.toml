[project]
name = "sub2clip"
version = "2.4.0"
description = "Core logic for clip generation"
requires-python = ">=3.10"
dependencies = [
  "pysubs2>=1.8.0",
  "python-ffmpeg>=2.0.12",
  "pillow>=12.1.0",
  "returns>=0.26.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]